name: Deploy render-book

on:
  workflow_dispatch:

concurrency:
  group: deploy-render-book
  cancel-in-progress: false

env:
  DEPLOY_PATH: /www/wwwroot/fba-render-service
  SERVICE_NAME: fba-render-service

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.DEPLOY_SSH_PORT || 22 }} -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Pull and deploy
        run: |
          ssh -p ${{ secrets.DEPLOY_SSH_PORT || 22 }} \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'DEPLOY'
          set -e

          cd ${{ env.DEPLOY_PATH }}
          git pull origin main

          if ! command -v uv >/dev/null 2>&1; then
            echo "uv is not installed or not available in PATH"
            exit 1
          fi

          uv venv .venv --allow-existing
          uv pip install --python .venv/bin/python \
            -r render_service/requirements.txt \
            -i https://mirrors.aliyun.com/pypi/simple/ \
            --extra-index-url https://pypi.org/simple

          systemctl restart ${{ env.SERVICE_NAME }}
          systemctl status ${{ env.SERVICE_NAME }} --no-pager -l
          DEPLOY
